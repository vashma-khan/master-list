<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VKB</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1B2A4A;--teal:#007C8A;--gold:#C9972B;--bg:#F0F2F7;--card:#fff;--border:#DDE3EE;--muted:#7A8A9D;--danger:#C02B2B;--green:#1A7A3E}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;background:var(--bg);height:100vh;overflow:hidden}
#pin-screen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000}
#pin-screen.hidden{display:none}
.pin-logo{font-family:Georgia,serif;color:var(--gold);font-size:14px;letter-spacing:.18em;font-weight:700;margin-bottom:6px}
.pin-sub{color:rgba(255,255,255,.3);font-size:11px;margin-bottom:36px}
.pin-dots{display:flex;gap:12px;margin-bottom:30px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);transition:all .15s}
.pin-dot.filled{background:var(--teal);border-color:var(--teal)}
.pin-pad{display:grid;grid-template-columns:repeat(3,64px);gap:10px}
.pin-btn{width:64px;height:64px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.pin-btn:active{background:rgba(0,124,138,.5)}
.pin-error{color:#ff6b6b;font-size:12px;margin-top:14px;height:16px;text-align:center}
#app{display:flex;height:100vh}
#app.hidden{display:none}
#sidebar{width:210px;min-width:210px;background:var(--navy);display:flex;flex-direction:column;overflow:hidden;transition:width .2s ease,min-width .2s ease;flex-shrink:0;z-index:20}
#sidebar.collapsed{width:0;min-width:0}
.sb-brand{padding:22px 20px 14px;border-bottom:1px solid rgba(255,255,255,.07);white-space:nowrap}
.sb-brand-name{font-family:Georgia,serif;color:var(--gold);font-size:12px;letter-spacing:.14em;font-weight:700;text-transform:uppercase}
.sb-brand-sub{color:rgba(255,255,255,.3);font-size:10px;margin-top:2px}
#nav{flex:1;overflow-y:auto;padding:8px 0;white-space:nowrap}
.nav-group{padding:10px 20px 3px;color:rgba(255,255,255,.22);font-size:9px;letter-spacing:.16em;font-weight:700}
.nav-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 20px;background:transparent;border:none;border-left:2px solid transparent;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.nav-btn.active{background:rgba(0,124,138,.22);border-left-color:var(--teal)}
.nav-lbl{color:rgba(255,255,255,.5);font-size:13px;font-family:inherit;pointer-events:none}
.nav-btn.active .nav-lbl{color:#fff}
.nav-lbl.priv{color:rgba(201,151,43,.5)}
.nav-btn.active .nav-lbl.priv{color:var(--gold)}
.nav-badge{background:rgba(255,255,255,.1);color:rgba(255,255,255,.45);font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600;pointer-events:none}
.nav-btn.active .nav-badge{background:var(--teal);color:#fff}
.sb-footer{padding:10px 20px 16px;border-top:1px solid rgba(255,255,255,.07);color:rgba(255,255,255,.2);font-size:10px;white-space:nowrap}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#hdr{background:#fff;border-bottom:1px solid var(--border);padding:11px 13px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#hdr-toggle{background:none;border:none;cursor:pointer;color:var(--navy);font-size:20px;padding:1px 5px;line-height:1;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#hdr-info{flex:1;min-width:0}
#hdr-info h1{font-family:Georgia,serif;color:var(--navy);font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#hdr-info p{color:var(--muted);font-size:11px}
#hdr-search{border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-size:12px;color:var(--navy);outline:none;width:90px;background:var(--bg);font-family:inherit;flex-shrink:0}
#ftabs{display:flex;gap:2px;background:var(--bg);border-radius:7px;padding:2px;flex-shrink:0}
.ftab{padding:4px 7px;border-radius:5px;border:none;cursor:pointer;font-size:11px;background:transparent;color:var(--muted);font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.ftab.active{background:#fff;color:var(--navy);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}
#content{flex:1;overflow-y:auto;padding:11px 11px 90px;display:flex;flex-direction:column;gap:6px}
.ri{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border-radius:9px;border:1px solid var(--border);cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:opacity .15s,border-color .15s}
.ri.done{opacity:.5;border-color:#b6d9be}
.ri-check{width:22px;height:22px;border-radius:50%;flex-shrink:0;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s;pointer-events:none}
.ri.done .ri-check{background:var(--green);border-color:var(--green)}
.ri-tick{color:#fff;font-size:11px;display:none;pointer-events:none}
.ri.done .ri-tick{display:block}
.ri-body{pointer-events:none}
.ri-title{font-size:13px;color:var(--navy);font-weight:500}
.ri.done .ri-title{text-decoration:line-through}
.ri-note{font-size:11px;color:var(--muted);margin-top:2px}
.tc{background:var(--card);border-radius:9px;overflow:hidden;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04);transition:border-color .15s,box-shadow .15s}
.tc.exp{border-color:var(--teal);box-shadow:0 2px 16px rgba(0,124,138,.1)}
.tc.done-c{opacity:.55}
.tc.goal-c{background:linear-gradient(135deg,#f7f3ea,#fff);border-color:rgba(201,151,43,.35)}
.tr{display:flex;align-items:center;gap:10px;padding:12px 13px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.tc-check{width:22px;height:22px;border-radius:50%;flex-shrink:0;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s}
.tc.done-c .tc-check{background:var(--green);border-color:var(--green)}
.tc-title{flex:1;font-size:13px;color:var(--navy);font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
.tc.done-c .tc-title{text-decoration:line-through}
.tc.goal-c .tc-title{color:#7a5e08;font-weight:600}
.tc-meta{display:flex;align-items:center;gap:5px;flex-shrink:0;pointer-events:none}
.t-bang{color:var(--danger);font-weight:800;font-size:14px;line-height:1}
.t-due,.t-ms,.t-chase{font-size:10px;color:var(--muted);background:var(--bg);padding:2px 6px;border-radius:5px}
.t-chase{background:#FAF2E3}
.t-del{font-size:10px;color:var(--gold);font-weight:600}
.s-pill{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0}
.t-chev{color:var(--muted);font-size:11px;margin-left:1px}
.goal-tag{font-size:9px;margin-left:6px;color:var(--gold);font-weight:700;letter-spacing:.08em}
.td{border-top:1px solid var(--border);padding:13px 13px 13px 45px;background:#FAFBFC}
.fl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.08em;margin-bottom:4px;text-transform:uppercase}
.fr{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;flex:1;min-width:100px}
.fi,.fs{width:100%;padding:7px 10px;border-radius:7px;border:1px solid var(--border);font-size:13px;color:var(--navy);background:var(--bg);outline:none;font-family:inherit}
.fta{width:100%;padding:7px 10px;border-radius:7px;border:1px solid var(--border);font-size:13px;color:var(--navy);background:var(--bg);outline:none;font-family:inherit;resize:vertical}
.ms-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.ms-chk{width:15px;height:15px;border-radius:4px;flex-shrink:0;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .13s;pointer-events:none}
.ms-row.ms-done .ms-chk{background:var(--teal);border-color:var(--teal)}
.ms-tick{color:#fff;font-size:9px;display:none;pointer-events:none}
.ms-row.ms-done .ms-tick{display:block}
.ms-lbl{font-size:12px;color:var(--navy);pointer-events:none}
.ms-row.ms-done .ms-lbl{text-decoration:line-through;color:var(--muted)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--danger);font-size:11px;padding:4px 0 0;opacity:.7;font-family:inherit;-webkit-tap-highlight-color:transparent}
#fab{position:fixed;bottom:22px;right:18px;width:52px;height:52px;border-radius:50%;background:var(--teal);border:none;cursor:pointer;color:#fff;font-size:28px;font-weight:300;box-shadow:0 4px 20px rgba(0,124,138,.45);display:flex;align-items:center;justify-content:center;z-index:30;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#fab.hidden{display:none}
#mo{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200}
#mo.hidden{display:none}
#md{background:#fff;border-radius:16px 16px 0 0;padding:24px 20px 36px;width:100%;max-width:580px;box-shadow:0 -8px 40px rgba(0,0,0,.2)}
.m-title{font-family:Georgia,serif;color:var(--navy);font-size:17px;font-weight:700;margin-bottom:14px}
.m-inp{width:100%;padding:8px 10px;border-radius:7px;border:1px solid var(--border);font-size:14px;color:var(--navy);background:var(--bg);outline:none;font-family:inherit;margin-bottom:10px}
.m-acts{display:flex;gap:8px}
.btn-c{flex:1;padding:12px;border-radius:9px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-size:13px;font-family:inherit}
.btn-a{flex:2;padding:12px;border-radius:9px;border:none;background:var(--teal);color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
#set-btn{position:fixed;bottom:24px;left:18px;width:36px;height:36px;border-radius:50%;background:rgba(27,42,74,.1);border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:30;color:var(--navy);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#so{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:300}
#so.hidden{display:none}
#sm{background:#fff;border-radius:16px 16px 0 0;padding:24px 20px 40px;width:100%;max-width:580px}
.cubio-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center;padding:40px}
.empty-msg{text-align:center;color:var(--muted);margin-top:60px;font-size:13px}
@media(max-width:640px){#sidebar{position:fixed;top:0;left:0;bottom:0}}
</style>
</head>
<body>

<div id="pin-screen">
  <div class="pin-logo">VKB</div>
  <div class="pin-sub">Master List</div>
  <div class="pin-dots">
    <div class="pin-dot" id="dot-0"></div><div class="pin-dot" id="dot-1"></div>
    <div class="pin-dot" id="dot-2"></div><div class="pin-dot" id="dot-3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" data-p="1">1</button><button class="pin-btn" data-p="2">2</button><button class="pin-btn" data-p="3">3</button>
    <button class="pin-btn" data-p="4">4</button><button class="pin-btn" data-p="5">5</button><button class="pin-btn" data-p="6">6</button>
    <button class="pin-btn" data-p="7">7</button><button class="pin-btn" data-p="8">8</button><button class="pin-btn" data-p="9">9</button>
    <button class="pin-btn"></button><button class="pin-btn" data-p="0">0</button>
    <button class="pin-btn" data-p="del" style="font-size:16px;color:rgba(255,255,255,.6)">⌫</button>
  </div>
  <div class="pin-error" id="pin-err"></div>
</div>

<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="sb-brand"><div class="sb-brand-name">VKB</div><div class="sb-brand-sub">Master List</div></div>
    <nav id="nav"></nav>
    <div class="sb-footer">PIN secured</div>
  </aside>
  <div id="main">
    <div id="hdr">
      <button id="hdr-toggle">☰</button>
      <div id="hdr-info"><h1 id="view-title">Today</h1><p id="view-sub"></p></div>
      <input id="hdr-search" placeholder="Search..." style="display:none">
      <div id="ftabs" style="display:none">
        <button class="ftab active" data-filter="active">Active</button>
        <button class="ftab" data-filter="done">Done</button>
        <button class="ftab" data-filter="all">All</button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<button id="fab" class="hidden">+</button>
<button id="set-btn">⚙</button>

<div id="mo" class="hidden">
  <div id="md">
    <div class="m-title">Add Task</div>
    <input id="m-t" class="m-inp" placeholder="What needs doing...">
    <div class="fr">
      <div class="fg"><div class="fl">Category</div><select id="m-c" class="fi" style="cursor:pointer"></select></div>
      <div class="fg" style="max-width:100px"><div class="fl">Priority</div>
        <select id="m-p" class="fi" style="cursor:pointer"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select>
      </div>

    <div class="m-acts">
      <button class="btn-c" id="btn-cancel">Cancel</button>
      <button class="btn-a" id="btn-add">Add Task</button>
    </div>
  </div>
</div>

<div id="so" class="hidden">
  <div id="sm">
    <div class="m-title" style="margin-bottom:16px">Settings</div>
    <div class="fl" style="margin-bottom:4px">Change PIN (4 digits)</div>
    <input id="new-pin" class="m-inp" type="password" maxlength="4" placeholder="Enter new PIN" style="max-width:160px;margin-bottom:8px">
    <button class="btn-a" id="btn-save-pin" style="max-width:160px;padding:9px 14px;margin-bottom:24px;display:block">Save PIN</button>
    <div style="border-top:1px solid var(--border);padding-top:16px">
      <div class="fl" style="margin-bottom:6px">Export / Import data</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6">To sync to another device: Export here, Import there.</p>
      <div style="display:flex;gap:8px">
        <button class="btn-c" id="btn-export" style="max-width:130px">Export</button>
        <label class="btn-a" style="max-width:130px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:9px">Import<input type="file" id="import-file" accept=".json" style="display:none"></label>
      </div>
    </div>
  </div>
</div>

mk('cv2','Nyla cushion plan — handmake','crafted','todo','medium'),mk('cv3','Crochet inventory','crafted','todo','low')];

let tasks=[],recur={},cat='today',expId=null,filt='active',sq='',sbOpen=true;

const todayKey=()=>new Date().toISOString().split('T')[0];
const monthKey=()=>{const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)};
function weekKey(){const d=new Date(),day=d.getDay()||7,thu=new Date(d);thu.setDate(d.getDate()+4-day);const j=new Date(thu.getFullYear(),0,1);return thu.getFullYear()+'-W'+Math.ceil(((thu-j)/86400000+1)/7)}
function rKey(type){return type==='daily'?'D-'+todayKey():type==='weekly'?'W-'+weekKey():'M-'+monthKey()}
const isRD=(type,id)=>!!((recur[rKey(type)]||{})[id]);
const getPin=()=>localStorage.getItem('vkb-pin')||'1234';

function save(){try{localStorage.setItem('vkb-t7',JSON.stringify(tasks));localStorage.setItem('vkb-r7',JSON.stringify(recur));}catch(e){}}
function load(){try{const t=localStorage.getItem('vkb-t7'),r=localStorage.getItem('vkb-r7');tasks=t?JSON.parse(t):JSON.parse(JSON.stringify(SEED));recur=r?JSON.parse(r):{};}catch(e){tasks=JSON.parse(JSON.stringify(SEED));recur={};}}

let pe='';
function pinPress(d){
  if(d==='del'){pe=pe.slice(0,-1);updDots();return;}
  if(pe.length>=4)return;
  pe+=d;updDots();
  if(pe.length===4){setTimeout(()=>{if(pe===getPin()){document.getElementById('pin-screen').classList.add('hidden');document.getElementById('app').classList.remove('hidden');init();}else{document.getElementById('pin-err').textContent='Incorrect PIN';pe='';updDots();setTimeout(()=>document.getElementById('pin-err').textContent='',1500);}},120);}
}
function updDots(){for(let i=0;i<4;i++)document.getElementById('dot-'+i).classList.toggle('filled',i<pe.length);}

function init(){
  load();
  populateCatSelect();
  sbOpen=window.innerWidth>=640;
  if(!sbOpen)document.getElementById('sidebar').classList.add('collapsed');
  renderAll();
  bindAll();
}

function bindAll(){
  // PIN
  document.getElementById('pin-screen').addEventListener('click',e=>{const b=e.target.closest('.pin-btn');if(b)pinPress(b.dataset.p||'');});
  // Sidebar
  document.getElementById('hdr-toggle').addEventListener('click',()=>{sbOpen=!sbOpen;document.getElementById('sidebar').classList.toggle('collapsed',!sbOpen);});
  // Nav
  document.getElementById('nav').addEventListener('click',e=>{const b=e.target.closest('.nav-btn');if(b&&b.dataset.cat)selCat(b.dataset.cat);});
  // Filters
  document.getElementById('ftabs').addEventListener('click',e=>{const t=e.target.closest('.ftab');if(!t)return;filt=t.dataset.filter;document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('active'));t.classList.add('active');renderContent();});
  // Search
  document.getElementById('hdr-search').addEventListener('input',e=>{sq=e.target.value.toLowerCase();renderContent();});
  // Content delegation
  const c=document.getElementById('content');
  c.addEventListener('click',e=>{
    const ri=e.target.closest('.ri');
    if(ri&&ri.dataset.type){const k=rKey(ri.dataset.type);recur[k]=recur[k]||{};recur[k][ri.dataset.id]=!recur[k][ri.dataset.id];save();renderContent();renderNav();return;}
    const chk=e.target.closest('.tc-check');
    if(chk&&chk.dataset.id){e.stopPropagation();tickTask(chk.dataset.id);return;}
    const tr=e.target.closest('.tr');
    if(tr&&tr.dataset.id){expId=expId===tr.dataset.id?null:tr.dataset.id;renderContent();return;}
    const ms=e.target.closest('.ms-row');
    if(ms&&ms.dataset.tid){const t=tasks.find(t=>t.id===ms.dataset.tid);if(t){const m=t.milestones.find(m=>m.id===ms.dataset.mid);if(m){m.done=!m.done;save();renderContent();}}return;}
    const db=e.target.closest('.del-btn');
    if(db&&db.dataset.id){if(confirm('Delete this task?')){tasks=tasks.filter(t=>t.id!==db.dataset.id);expId=null;save();renderAll();}return;}
  });
  c.addEventListener('change',e=>{const el=e.target;if(el.dataset.id&&el.dataset.field)updTask(el.dataset.id,el.dataset.field,el.value);});
  c.addEventListener('input',e=>{const el=e.target;if(el.dataset.id&&el.dataset.field&&el.tagName==='TEXTAREA')updTask(el.dataset.id,el.dataset.field,el.value);});
  // FAB
  document.getElementById('fab').addEventListener('click',openAdd);
  // Modal
  document.getElementById('mo').addEventListener('click',e=>{if(e.target.id==='mo')closeAdd();});
  document.getElementById('btn-cancel').addEventListener('click',closeAdd);
  document.getElementById('btn-add').addEventListener('click',submitAdd);
  document.getElementById('m-t').addEventListener('keydown',e=>{if(e.key==='Enter')submitAdd();});
  // Settings
  document.getElementById('set-btn').addEventListener('click',()=>document.getElementById('so').classList.remove('hidden'));
  document.getElementById('so').addEventListener('click',e=>{if(e.target.id==='so')document.getElementById('so').classList.add('hidden');});
  document.getElementById('btn-save-pin').addEventListener('click',()=>{const n=document.getElementById('new-pin').value.trim();if(!/^\d{4}$/.test(n)){alert('PIN must be 4 digits');return;}localStorage.setItem('vkb-pin',n);document.getElementById('new-pin').value='';document.getElementById('so').classList.add('hidden');alert('PIN updated');});
  document.getElementById('btn-export').addEventListener('click',exportD);
  document.getElementById('import-file').addEventListener('change',importD);
  window.addEventListener('resize',()=>{if(window.innerWidth>=640&&!sbOpen){sbOpen=true;document.getElementById('sidebar').classList.remove('collapsed');}});
}

function selCat(id){cat=id;expId=null;sq='';document.getElementById('hdr-search').value='';if(window.innerWidth<640){sbOpen=false;document.getElementById('sidebar').classList.add('collapsed');}renderAll();}

function badge(id){
  if(id==='daily')return DAILY.filter(i=>!isRD('daily',i.id)).length;
  if(id==='weekly')return WEEKLY.filter(i=>!isRD('weekly',i.id)).length;
  if(id==='monthly')return MONTHLY.filter(i=>!isRD('monthly',i.id)).length;
  return tasks.filter(t=>t.category===id&&t.status!=='done').length;
}

function renderNav(){
  let h='<div class="nav-group">PINNED</div>';
  PNAV.forEach(p=>{const a=cat===p.id,c=badge(p.id);h+=`<button class="nav-btn${a?' active':''}" data-cat="${p.id}"><span class="nav-lbl">${p.icon} ${p.label}</span>${c>0?`<span class="nav-badge">${c}</span>`:''}</button>`;});
  ['WORK','LIFE','PRIVATE'].forEach(g=>{
    h+=`<div class="nav-group">${g}</div>`;
    CATS.filter(c=>c.group===g).forEach(c=>{const a=cat===c.id,cnt=tasks.filter(t=>t.category===c.id&&t.status!=='done').length;h+=`<button class="nav-btn${a?' active':''}" data-cat="${c.id}"><span class="nav-lbl${c.private?' priv':''}">${c.private?'◆ ':''}${c.label}</span>${cnt>0&&!c.private?`<span class="nav-badge">${cnt}</span>`:''}</button>`;});
  });
  document.getElementById('nav').innerHTML=h;
}

function renderHdr(){
  const isR=['daily','weekly','monthly'].includes(cat),iC=cat==='cubio',show=!isR&&!iC;
  const lbl=PNAV.find(p=>p.id===cat)?.label||CATS.find(c=>c.id===cat)?.label||'';
  document.getElementById('view-title').textContent=lbl;
  document.getElementById('view-title').style.color=iC?'#C9972B':'#1B2A4A';
  document.getElementById('hdr-search').style.display=show?'':'none';
  document.getElementById('ftabs').style.display=show?'':'none';
  if(show){const ft=getFiltered();document.getElementById('view-sub').textContent=ft.filter(t=>t.status!=='done').length+' active · '+ft.filter(t=>t.status==='done').length+' done';}
  else document.getElementById('view-sub').textContent=isR?'Tap to tick off':'';
}

function getFiltered(){
  const cd=CATS.find(c=>c.id===cat);
  return tasks.filter(t=>{
    if(t.category!==cat)return false;
    if(sq&&!t.title.toLowerCase().includes(sq)&&!(t.notes||'').toLowerCase().includes(sq))return false;
    if(filt==='active')return t.status!=='done';
    if(filt==='done')return t.status==='done';
    return true;
  }).sort((a,b)=>{if(!cd?.sortByDate)return 0;if(!a.dueDate&&!b.dueDate)return 0;if(!a.dueDate)return 1;if(!b.dueDate)return -1;return a.dueDate.localeCompare(b.dueDate);});
}

function renderContent(){
  const el=document.getElementById('content');let h='';
  if(cat==='daily')h=DAILY.map(i=>riH('daily',i)).join('');
  else if(cat==='weekly')h=WEEKLY.map(i=>riH('weekly',i)).join('');
  else if(cat==='monthly')h=MONTHLY.map(i=>riH('monthly',i)).join('');
  else if(cat==='cubio')h='<div class="cubio-ph"><div style="font-size:36px;color:#C9972B;margin-bottom:14px">◆</div><div style="font-family:Georgia,serif;color:#C9972B;font-size:16px;font-weight:700;margin-bottom:8px">UntitledCubio</div><div style="font-size:13px;color:#7A8A9D;line-height:1.7">Private space.<br>Content and structure to be defined.</div></div>';
  else{const ft=getFiltered();h=ft.length?ft.map(t=>tcH(t)).join(''):'<div class="empty-msg">Nothing here. Tap + to add.</div>';}
  el.innerHTML=h;
}

function renderAll(){renderNav();renderHdr();renderContent();const isR=['daily','weekly','monthly'].includes(cat);document.getElementById('fab').classList.toggle('hidden',isR||cat==='cubio');}

function riH(type,item){const done=isRD(type,item.id);return`<div class="ri${done?' done':''}" data-type="${type}" data-id="${item.id}"><div class="ri-check"><span class="ri-tick">✓</span></div><div class="ri-body"><div class="ri-title">${item.title}</div>${item.note?`<div class="ri-note">${item.note}</div>`:''}</div></div>`;}

function tcH(t){
  const done=t.status==='done',isG=t.title.startsWith('GOAL:'),disp=isG?t.title.replace('GOAL: ',''):t.title;
  const mt=(t.milestones||[]).length,md=(t.milestones||[]).filter(m=>m.done).length,s=SM[t.status]||SM.todo,exp=expId===t.id;
  let meta='';
  if(t.priority==='high'&&!done)meta+='<span class="t-bang">!</span>';
  if(t.dueDate)meta+=`<span class="t-due">${t.dueDate}</span>`;
  if(t.status==='delegated'&&t.delegatedTo)meta+=`<span class="t-del">→${t.delegatedTo}</span>`;
  if((t.status==='delegated'||t.status==='waiting')&&t.chaseDate)meta+=`<span class="t-chase">Chase ${t.chaseDate}</span>`;
  if(mt>0)meta+=`<span class="t-ms" style="color:${md===mt?'#1A7A3E':'#7A8A9D'}">${md}/${mt}</span>`;
  meta+=`<span class="s-pill" style="background:${s.bg};color:${s.color}">${s.label}</span><span class="t-chev">${exp?'▾':'▸'}</span>`;
  let det='';
  if(exp){
    const idel=t.status==='delegated'||t.status==='waiting';
    let msH='';
    if((t.milestones||[]).length>0)msH=`<div style="margin-bottom:10px"><div class="fl">Milestones</div>${t.milestones.map(m=>`<div class="ms-row${m.done?' ms-done':''}" data-tid="${t.id}" data-mid="${m.id}"><div class="ms-chk"><span class="ms-tick">✓</span></div><span class="ms-lbl">${m.title}</span></div>`).join('')}</div>`;
    det=`<div class="td">
      <div class="fr">
        <div class="fg"><div class="fl">Status</div><select class="fs" data-id="${t.id}" data-field="status">${Object.entries(SM).map(([k,v])=>`<option value="${k}"${t.status===k?' selected':''}>${v.label}</option>`).join('')}</select></div>
        <div class="fg" style="max-width:100px"><div class="fl">Priority</div><select class="fs" data-id="${t.id}" data-field="priority"><option value="high"${t.priority==='high'?' selected':''}>High</option><option value="medium"${t.priority==='medium'?' selected':''}>Medium</option><option value="low"${t.priority==='low'?' selected':''}>Low</option></select></div>
        <div class="fg"><div class="fl">Due Date</div><input type="date" class="fi" value="${t.dueDate||''}" data-id="${t.id}" data-field="dueDate"></div>
      </div>
      ${idel?`<div class="fr"><div class="fg"><div class="fl">${t.status==='delegated'?'Delegated to':'Waiting on'}</div><input class="fi" value="${t.delegatedTo||''}" placeholder="Name or detail..." data-id="${t.id}" data-field="delegatedTo"></div><div class="fg"><div class="fl">Chase Date</div><input type="date" class="fi" value="${t.chaseDate||''}" data-id="${t.id}" data-field="chaseDate"></div></div>`:''}
      <div style="margin-bottom:10px"><div class="fl">Move to category</div><select class="fs" style="max-width:200px" data-id="${t.id}" data-field="category"><option value="today"${t.category==='today'?' selected':''}>Today</option>${CATS.map(c=>`<option value="${c.id}"${t.category===c.id?' selected':''}>${c.label}</option>`).join('')}</select></div>
      <div style="margin-bottom:10px"><div class="fl">Notes</div><textarea class="fta" rows="2" data-id="${t.id}" data-field="notes">${t.notes||''}</textarea></div>
      ${msH}
      <button class="del-btn" data-id="${t.id}">Delete task</button>
    </div>`;
  }
  return`<div class="tc${exp?' exp':''}${done?' done-c':''}${isG?' goal-c':''}"><div class="tr" data-id="${t.id}"><div class="tc-check" data-id="${t.id}">${done?'<span style="color:#fff;font-size:10px;pointer-events:none">✓</span>':''}</div><span class="tc-title">${disp}${isG?'<span class="goal-tag">GOAL</span>':''}</span><div class="tc-meta">${meta}</div></div>${det}</div>`;
}

function tickTask(id){const t=tasks.find(t=>t.id===id);if(!t)return;t.status=t.status==='done'?'todo':'done';save();renderAll();}
function updTask(id,f,v){const t=tasks.find(t=>t.id===id);if(!t)return;t[f]=v;save();if(f==='status'||f==='category')renderAll();else renderHdr();}

function populateCatSelect(){document.getElementById('m-c').innerHTML=`<option value="today">Today</option>`+CATS.map(c=>`<option value="${c.id}">${c.label}</option>`).join('');}
function openAdd(){document.getElementById('m-c').value=(cat==='today'||CATS.find(c=>c.id===cat))?cat:'today';document.getElementById('m-t').value='';document.getElementById('m-n').value='';document.getElementById('m-d').value='';document.getElementById('mo').classList.remove('hidden');setTimeout(()=>document.getElementById('m-t').focus(),150);}
function closeAdd(){document.getElementById('mo').classList.add('hidden');}
function submitAdd(){const title=document.getElementById('m-t').value.trim();if(!title)return;tasks.unshift({id:Date.now().toString(),title,category:document.getElementById('m-c').value,status:'todo',priority:document.getElementById('m-p').value,dueDate:document.getElementById('m-d').value,notes:document.getElementById('m-n').value,delegatedTo:'',chaseDate:'',milestones:[]});save();closeAdd();renderAll();}

function exportD(){const blob=new Blob([JSON.stringify({tasks,recur,at:new Date().toISOString()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='vkb-'+todayKey()+'.json';a.click();}
function importD(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.tasks){tasks=d.tasks;recur=d.recur||{};save();renderAll();document.getElementById('so').classList.add('hidden');alert('Imported successfully');}else alert('Invalid file');}catch{alert('Could not read file');}};r.readAsText(f);}
</script>
